tribe:
  id: first_tribe
  name: 初火部落
  chief: deepseek_reasoner

  election:
    strategy: weighted_score
    required_roles:
      - chief

  council:
    proposal_count: 1
    chief_must_choose_one: true

  execution:
    max_retry_before_help: 2
    help_targets:
      - shaman
      - chief

  review:
    required: true
    reviewer: chief

  manual:
    allow_agent_proposals: true
    auto_apply: false
